{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class ="sub-text">
            start your AI career journey
        </p>
        {% if error %}
            <p style="color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; border: 1px solid rgba(248, 113, 113, 0.2);">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <input type="password" name="password" placeholder="Create a password" required>
            <p class="sub-text">Use at least 6 characters</p>
            <button type="submit">Sign Up</button>
        </form>
        <p class="sub-text">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
