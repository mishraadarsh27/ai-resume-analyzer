{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="sub-text">Log in to access your dashboard</p>
        
        {% if error %}
            <div class="alert-error">
                <i class="lucide-alert-circle"></i>
                <span>{{ error }}</span>
            </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon-wrapper">
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@company.com" required>
                    <i class="lucide-mail"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    <i class="lucide-lock"></i>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Sign In <i class="lucide-log-in"></i></button>
        </form>
        
        <p class="switch-text"> 
            Don't have an account? <a href="/signup">Sign up here</a>
        </p>
    </div>
</div>
{% endblock %}
